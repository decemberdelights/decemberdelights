services:
  - type: web
    name: december-delights-api
    runtime: python
    plan: free
    buildCommand: pip install -r backend/requirements.txt
    startCommand: cd backend && uvicorn main:app --host 0.0.0.0 --port $PORT --workers 1
    envVars:
      - key: ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: ADMIN_DEFAULT_PASSWORD
        generateValue: true
      - key: ADMIN_USERNAME
        value: admin
      - key: CORS_ORIGINS
        value: "*"
      - key: DATABASE_URL
        fromDatabase:
          name: december-delights-db
          property: connectionString
    healthCheckPath: /api/health
    autoDeploy: true

databases:
  - name: december-delights-db
    plan: free
    databaseName: december_delights
    ipAllowList: []
