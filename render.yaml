services:
  # ── Backend (FastAPI + Python) ──────────────────────────────────
  - type: web
    name: dd-backend
    runtime: python
    plan: free
    buildCommand: cd backend && pip install -r requirements.txt
    startCommand: cd backend && uvicorn main:app --host 0.0.0.0 --port $PORT --workers 1
    envVars:
      - key: PYTHON_VERSION
        value: "3.11"
      - key: ENV
        value: production
      - key: ADMIN_DEFAULT_PASSWORD
        value: admin123
      - key: ADMIN_USERNAME
        value: admin
      - key: HOST
        value: 0.0.0.0

  # ── Frontend (Next.js + Node) ──────────────────────────────────
  - type: web
    name: dd-frontend
    runtime: node
    plan: free
    buildCommand: npm ci && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: NEXT_PUBLIC_SUPABASE_URL
        sync: false
      - key: NEXT_PUBLIC_SUPABASE_ANON_KEY
        sync: false
